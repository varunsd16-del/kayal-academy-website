[build]
  command = "npm run build"
  publish = "dist"

# Force no trailing slash — matches trailingSlash: "never" in astro.config.mjs
[[redirects]]
  from = "/about/"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/contact/"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/courses/"
  to = "/courses"
  status = 301
  force = true

[[redirects]]
  from = "/faq/"
  to = "/faq"
  status = 301
  force = true

[[redirects]]
  from = "/feedback/"
  to = "/feedback"
  status = 301
  force = true

[[redirects]]
  from = "/achievements/"
  to = "/achievements"
  status = 301
  force = true

# Performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/achievements/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/courses/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"